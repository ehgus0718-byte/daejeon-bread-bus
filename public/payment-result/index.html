<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>결제 처리 중 | 대전빵버스</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff8ef; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 24px; padding: 40px 28px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .spinner { width: 44px; height: 44px; border: 4px solid #fed7aa; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon { font-size: 52px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 900; color: #0c0a09; margin-bottom: 8px; }
    .desc { font-size: 14px; font-weight: 600; color: #78716c; line-height: 1.6; margin-bottom: 12px; }
    .badge { padding: 12px 16px; border-radius: 14px; font-size: 13px; font-weight: 700; margin-top: 12px; }
    .badge.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .badge.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn { display: inline-block; margin-top: 20px; padding: 14px 28px; border-radius: 14px; font-size: 14px; font-weight: 900; text-decoration: none; background: #f97316; color: white; cursor: pointer; border: none; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div id="loading">
      <div class="spinner"></div>
      <div class="title">결제 승인 처리 중</div>
      <div class="desc">잠시만 기다려주세요.<br>창을 닫지 마세요.</div>
    </div>
    <div id="result" style="display:none"></div>
  </div>

  <!-- 나이스페이가 POST로 보내는 hidden form 값을 수신하는 폼 -->
  <form id="returnForm" method="post" style="display:none"></form>

  <script>
    const APPROVE_URL = 'https://mnwimnwdilerkktizzqn.supabase.co/functions/v1/nicepay-approve';
    const SUPABASE_URL = 'https://mnwimnwdilerkktizzqn.supabase.co';

    function showResult({ success, icon, title, desc, detail }) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.innerHTML = `
        <div class="icon">${icon}</div>
        <div class="title">${title}</div>
        <div class="desc">${desc}</div>
        ${detail ? `<div class="badge ${success ? 'success' : 'error'}">${detail}</div>` : ''}
        ${success ? '<div class="desc" style="margin-top:12px;font-size:12px;color:#a8a29e">예약 확정 문자를 확인해주세요.<br>3초 후 홈으로 이동합니다.</div>' : ''}
        ${!success ? '<a href="/" class="btn">홈으로 돌아가기</a>' : ''}
      `;
    }

    async function processPayment() {
      // 나이스페이 모바일은 POST body로 파라미터 전달
      // document.forms 또는 hidden input으로 접근
      // 실제로는 서버가 없으므로 URL 쿼리스트링 + 폼 데이터 둘 다 시도

      // 방법 1: URL QueryString (PC 또는 일부 모바일)
      let params = Object.fromEntries(new URLSearchParams(window.location.search));

      // 방법 2: document에 삽입된 hidden form 값 (나이스페이가 직접 주입하는 경우)
      // 나이스페이 모바일은 페이지를 POST로 호출 → React SPA 특성상 body 접근 불가
      // 대신 window.__nicepayParams 전역 변수로 서버사이드 주입이 필요
      // → 현재 구조(정적 SPA)에서는 쿼리스트링 방식만 지원 가능

      // AuthResultCode 확인
      const authCode = params.AuthResultCode;

      if (!authCode) {
        // POST body 접근 불가 안내
        showResult({
          success: false,
          icon: '⚠️',
          title: '결제 파라미터를 받지 못했습니다',
          desc: '모바일 결제 후 이 페이지에 직접 접근하셨거나,\n결제 시스템 설정이 필요합니다.',
          detail: '고객센터 문의: 010-4560-6701'
        });
        return;
      }

      if (authCode !== '0000') {
        showResult({
          success: false,
          icon: '❌',
          title: '결제 인증 실패',
          desc: '결제가 취소되었거나 인증에 실패했습니다.',
          detail: params.AuthResultMsg || `오류 코드: ${authCode}`
        });
        return;
      }

      // 승인 요청
      try {
        const resp = await fetch(APPROVE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params),
        });
        const result = await resp.json();

        if (result.ok) {
          // 예약 저장 (Supabase REST API 직접 호출)
          try {
            let reservedInfo = {};
            try { reservedInfo = JSON.parse(params.ReqReserved || '{}'); } catch {}
            if (reservedInfo.date) {
              const anonKey = await fetch(`${SUPABASE_URL}/functions/v1/nicepay-sign`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ _getAnonKey: true }),
              }).then(r => r.json()).then(d => d.anonKey).catch(() => null);

              // reservationRepository 없으므로 Supabase REST 직접 호출
              await fetch(`${SUPABASE_URL}/rest/v1/reservations`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ud2ltbndkaWxlcmtrdGl6enFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgxNzM2MjMsImV4cCI6MjA2Mzc0OTYyM30.pFCnb6G3BuFiQ72H-eCbMaEJFVy0KJHD-IFsTqCqGgg',
                  'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ud2ltbndkaWxlcmtrdGl6enFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgxNzM2MjMsImV4cCI6MjA2Mzc0OTYyM30.pFCnb6G3BuFiQ72H-eCbMaEJFVy0KJHD-IFsTqCqGgg',
                  'Prefer': 'return=minimal',
                },
                body: JSON.stringify({
                  date: reservedInfo.date,
                  name: params.BuyerName || '',
                  phone: params.BuyerTel || '',
                  people: Number(reservedInfo.people || 1),
                  adult_count: Number(reservedInfo.adultCount || 1),
                  child_count: Number(reservedInfo.childCount || 0),
                  infant_count: Number(reservedInfo.infantCount || 0),
                  price: Number(result.Amt || 0),
                  status: '결제완료',
                  payment_tid: result.TID || '',
                  payment_method: result.PayMethod || 'CARD',
                })
              });
            }
          } catch (saveErr) {
            console.warn('예약 저장 실패:', saveErr);
          }

          showResult({
            success: true,
            icon: '🎉',
            title: '결제 완료!',
            desc: '예약이 확정되었습니다.',
            detail: `결제금액: ${Number(result.Amt).toLocaleString()}원 · 승인번호: ${result.AuthCode || '-'}`
          });
          setTimeout(() => { window.location.href = '/'; }, 3000);
        } else {
          showResult({
            success: false,
            icon: '⚠️',
            title: '결제 승인 실패',
            desc: '고객센터로 문의해주세요.\n010-4560-6701',
            detail: result.message || '알 수 없는 오류'
          });
        }
      } catch (err) {
        showResult({
          success: false,
          icon: '⚠️',
          title: '네트워크 오류',
          desc: '결제 승인 중 통신 오류가 발생했습니다.\n고객센터: 010-4560-6701',
          detail: String(err)
        });
      }
    }

    processPayment();
  </script>
</body>
</html>
